name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Web Distribution Directory
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Labour App</title><script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script></head><body style="margin:0;font-family:sans-serif;background:#f4f4f9;"><div id="root"></div><script type="module">' > dist/index.html
          cat App.jsx >> dist/index.html
          echo '</script></body></html>' >> dist/index.html

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android Studio Project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "King Off Group" "com.kingoff.labourapp" --web-dir=dist
          npx cap add android
          npx cap sync

      - name: Build Final Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Download Link
        uses: actions/upload-artifact@v4
        with:
          name: LabourApp-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
